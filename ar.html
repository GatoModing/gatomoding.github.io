<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Museo Marino · 3D</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root { --glow:#00c8ff; --accent:#00ffc8; --deep:#020d18; --text:#d6f0ff; }
    * { box-sizing:border-box; margin:0; padding:0; }
    html, body { width:100%; height:100%; overflow:hidden; background:#020d18; font-family:'Jost',sans-serif; }

    /* Oculta video moviéndolo fuera de pantalla sin afectar el canvas */
    video { position:fixed!important; left:-9999px!important; opacity:0!important; }

    /* Pantalla de carga */
    #loading-screen {
      position:fixed; inset:0; background:var(--deep); z-index:999;
      display:flex; align-items:center; justify-content:center;
      flex-direction:column; gap:2rem; transition:opacity 0.6s ease;
    }
    #loading-screen.hidden { opacity:0; pointer-events:none; }
    .loading-logo { font-family:'Playfair Display',serif; font-size:1.8rem; color:#fff; }
    .loading-logo span { color:var(--glow); font-style:italic; }
    .loading-bar-wrap { width:200px; height:2px; background:rgba(255,255,255,0.1); }
    .loading-bar { height:100%; background:linear-gradient(to right,var(--glow),var(--accent)); width:0%; transition:width 0.4s ease; }
    .loading-text { font-size:0.78rem; letter-spacing:0.2em; text-transform:uppercase; color:rgba(255,255,255,0.4); }

    /* UI */
    #ui { position:fixed; inset:0; z-index:100; pointer-events:none; display:flex; flex-direction:column; justify-content:space-between; }
    #top-bar { display:flex; align-items:center; justify-content:space-between; padding:1rem 1.5rem; background:linear-gradient(to bottom,rgba(2,13,24,0.85),transparent); pointer-events:all; }
    #top-bar a { color:rgba(255,255,255,0.6); text-decoration:none; font-size:0.72rem; letter-spacing:0.15em; text-transform:uppercase; }
    #top-bar .logo { font-family:'Playfair Display',serif; font-size:0.95rem; color:rgba(255,255,255,0.85); font-style:italic; }
    #animal-selector { display:flex; gap:0.5rem; padding:0.6rem 1rem; overflow-x:auto; scrollbar-width:none; background:linear-gradient(to bottom,rgba(2,13,24,0.6),transparent); pointer-events:all; }
    #animal-selector::-webkit-scrollbar { display:none; }
    .animal-btn { flex-shrink:0; display:flex; align-items:center; gap:0.4rem; padding:0.5rem 1rem; background:rgba(2,13,24,0.7); border:1px solid rgba(0,200,255,0.2); color:rgba(255,255,255,0.7); font-family:'Jost',sans-serif; font-size:0.78rem; cursor:pointer; clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px)); white-space:nowrap; transition:background 0.2s,border-color 0.2s,color 0.2s; }
    .animal-btn.active { background:rgba(0,200,255,0.15); border-color:var(--glow); color:var(--glow); }
    .animal-btn .emoji { font-size:1.1rem; }
    #animal-info { padding:2rem 1.8rem 2.2rem; background:linear-gradient(to top,rgba(2,13,24,0.97) 55%,rgba(2,13,24,0.7) 85%,transparent); transition:opacity 0.6s,transform 0.6s; opacity:0; transform:translateY(28px); border-top:1px solid rgba(0,200,255,0.08); }
    #animal-info.visible { opacity:1; transform:translateY(0); }
    .info-tag { font-size:0.65rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--glow); margin-bottom:0.5rem; }
    .info-name { font-family:'Playfair Display',serif; font-size:clamp(1.6rem,5vw,2.2rem); color:#fff; margin-bottom:0.25rem; }
    .info-sci { font-size:0.82rem; font-style:italic; color:rgba(255,255,255,0.35); }
    .info-divider { width:36px; height:1px; background:linear-gradient(to right,var(--glow),transparent); margin:0.9rem 0; }
    .info-desc { font-size:0.88rem; color:rgba(255,255,255,0.65); line-height:1.8; max-width:540px; }

    /* Instrucción cuando no hay marcador */
    #scan-hint {
      position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
      z-index:50; text-align:center; pointer-events:none;
      transition:opacity 0.4s;
    }
    #scan-hint.hidden { opacity:0; }
    #scan-hint .hint-icon { font-size:3rem; margin-bottom:1rem; }
    #scan-hint p { font-size:0.85rem; color:rgba(255,255,255,0.5); letter-spacing:0.1em; }
  </style>
</head>
<body>

  <!-- Sin div de cobertura - el fondo negro se maneja en el canvas -->

  <div id="loading-screen">
    <div class="loading-logo">Museo <span>Marino</span></div>
    <div><div class="loading-bar-wrap"><div class="loading-bar" id="loading-bar"></div></div></div>
    <div class="loading-text" id="loading-text">Cargando modelos 3D...</div>
  </div>

  <a-scene
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono; trackingMethod: best;"
    renderer="antialias: true; alpha: false; clearColor: #020d18;"
    vr-mode-ui="enabled: false"
    loading-screen="enabled: false"
  >
    <a-assets id="assets-mgr" timeout="120000">
      <a-asset-item id="shark-model"     src="models/shark.glb"></a-asset-item>
      <a-asset-item id="octopus-model"   src="models/octopus.glb"></a-asset-item>
      <a-asset-item id="turtle-model"    src="models/turtle.glb"></a-asset-item>
      <a-asset-item id="clownfish-model" src="models/clownfish.glb"></a-asset-item>
      <a-asset-item id="crab-model"      src="models/crab.glb"></a-asset-item>
    </a-assets>

    <a-marker preset="hiro" id="main-marker" emitevents="true"
      smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
      <a-entity id="shark-entity"     gltf-model="#shark-model"     scale="0.5 0.5 0.5" position="0 0.5 0" animation="property:rotation;to:0 360 0;loop:true;dur:6000;easing:linear" visible="true"></a-entity>
      <a-entity id="octopus-entity"   gltf-model="#octopus-model"   scale="0.5 0.5 0.5" position="0 0.5 0" animation="property:rotation;to:0 360 0;loop:true;dur:7000;easing:linear" visible="false"></a-entity>
      <a-entity id="turtle-entity"    gltf-model="#turtle-model"    scale="0.5 0.5 0.5" position="0 0.5 0" animation="property:rotation;to:0 360 0;loop:true;dur:5000;easing:linear" visible="false"></a-entity>
      <a-entity id="clownfish-entity" gltf-model="#clownfish-model" scale="0.5 0.5 0.5" position="0 0.5 0" animation="property:rotation;to:0 360 0;loop:true;dur:4000;easing:linear" visible="false"></a-entity>
      <a-entity id="crab-entity"      gltf-model="#crab-model"      scale="0.5 0.5 0.5" position="0 0.5 0" animation="property:rotation;to:0 360 0;loop:true;dur:5500;easing:linear" visible="false"></a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <div id="scan-hint">
    <div class="hint-icon">🔍</div>
    <p>APUNTA AL MARCADOR HIRO</p>
  </div>

  <div id="ui">
    <div>
      <div id="top-bar">
        <a href="index.html">← Museo</a>
        <span class="logo">Museo Marino</span>
        <a href="markers.html">Marcador</a>
      </div>
      <div id="animal-selector">
        <button class="animal-btn active" onclick="selectAnimal('shark',this)">    <span class="emoji">🦈</span> Tiburón</button>
        <button class="animal-btn"        onclick="selectAnimal('octopus',this)">  <span class="emoji">🐙</span> Pulpo</button>
        <button class="animal-btn"        onclick="selectAnimal('turtle',this)">   <span class="emoji">🐢</span> Tortuga</button>
        <button class="animal-btn"        onclick="selectAnimal('clownfish',this)"><span class="emoji">🐠</span> Pez Payaso</button>
        <button class="animal-btn"        onclick="selectAnimal('crab',this)">     <span class="emoji">🦀</span> Cangrejo</button>
      </div>
    </div>
    <div id="animal-info">
      <p class="info-tag"   id="a-tag"></p>
      <h2 class="info-name" id="a-name"></h2>
      <p class="info-sci"   id="a-sci"></p>
      <div class="info-divider"></div>
      <p class="info-desc"  id="a-desc"></p>
    </div>
  </div>

  <script>
    const ANIMALS = {
      shark:     { tag:"Depredador · Pelágico",  name:"Tiburón Blanco", sci:"Carcharodon carcharias", desc:"El mayor depredador del océano. Puede detectar una gota de sangre en 100 litros de agua y alcanzar los 6 metros de longitud." },
      octopus:   { tag:"Cefalópodo · Bentónico", name:"Pulpo Común",    sci:"Octopus vulgaris",       desc:"Maestro del camuflaje con tres corazones y sangre azul. Capaz de resolver problemas complejos y abrir frascos con tapa." },
      turtle:    { tag:"Reptil · Migratorio",    name:"Tortuga Verde",  sci:"Chelonia mydas",         desc:"Viaja miles de kilómetros entre zonas de alimentación y reproducción. Puede vivir más de 80 años en libertad." },
      clownfish: { tag:"Pez · Arrecifal",        name:"Pez Payaso",     sci:"Amphiprioninae",         desc:"Vive en simbiosis con la anémona. Todos nacen machos y el dominante puede cambiar de sexo para convertirse en hembra." },
      crab:      { tag:"Crustáceo · Bentónico",  name:"Cangrejo Azul",  sci:"Callinectes sapidus",    desc:"Sangre azul por hemocianina con cobre. Fundamental en los ecosistemas costeros." }
    };

    let currentKey = 'shark';
    const infoPanel  = document.getElementById('animal-info');
    const scanHint   = document.getElementById('scan-hint');
    const cover      = document.getElementById('camera-cover');

    function selectAnimal(key, btn) {
      ['shark','octopus','turtle','clownfish','crab'].forEach(k => {
        document.getElementById(k+'-entity').setAttribute('visible', k === key);
      });
      document.querySelectorAll('.animal-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      currentKey = key;
      if (infoPanel.classList.contains('visible')) updateInfo(key);
    }

    function updateInfo(key) {
      const a = ANIMALS[key];
      document.getElementById('a-tag').textContent  = a.tag;
      document.getElementById('a-name').textContent = a.name;
      document.getElementById('a-sci').textContent  = a.sci;
      document.getElementById('a-desc').textContent = a.desc;
    }

    const loadingScreen = document.getElementById('loading-screen');
    const loadingBar    = document.getElementById('loading-bar');
    const loadingText   = document.getElementById('loading-text');
    const items = document.getElementById('assets-mgr').querySelectorAll('a-asset-item');
    let loaded = 0;
    items.forEach(item => {
      const onDone = () => {
        loaded++;
        const pct = Math.round((loaded / items.length) * 100);
        loadingBar.style.width = pct + '%';
        loadingText.textContent = `Cargando modelos... ${pct}%`;
      };
      item.addEventListener('loaded', onDone);
      item.addEventListener('error', onDone);
    });

    document.querySelector('a-scene').addEventListener('loaded', () => {
      loadingBar.style.width = '100%';
      loadingText.textContent = '¡Listo! Apunta al marcador HIRO';
      setTimeout(() => {
        loadingScreen.classList.add('hidden');
        setTimeout(() => loadingScreen.style.display = 'none', 700);
      }, 800);

      const marker = document.getElementById('main-marker');
      marker.addEventListener('markerFound', () => {
        updateInfo(currentKey);
        infoPanel.classList.add('visible');
        scanHint.classList.add('hidden');
      });
      marker.addEventListener('markerLost', () => {
        infoPanel.classList.remove('visible');
        scanHint.classList.remove('hidden');
      });
    });

    selectAnimal('shark', null);
  </script>
</body>
</html>
